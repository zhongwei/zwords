      CO: lose one's balance 失去平衡;balance oneself 保持自身平衡;a balance of nature 自然平衡;maintain balance 保持平衡
      E: 
        - Winds are the natural way of balancing uneven distribution of air pressure over the earth. 
        - A balanced meal consists of five key elements - proteins, carbohydrate, fats, vitamins and minerals. 
      T:
        - 风是平衡地球气压分配不均的自然方式。
        - 平衡的膳食包括五个关键的要素：蛋白质、碳水化合物、脂肪、维生素和矿物质。
      D: counterbalance(n. 平衡力 vt. 使平衡);well-balanced(a. 营养均衡的)
    brochure:
