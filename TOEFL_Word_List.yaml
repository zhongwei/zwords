-
  pre_suffix: 
    - crev	裂开	crevice	n. 缺口，裂缝
    - de	否定	debate	n./v. 辩论;讨论，争论
    - dis	离开	discharge	n. 流出物，放电 v. 释放
    - juven	年轻	juvenile	a. 少年的;幼稚的 n. 少年;幼体
    - sur	超过	surplus	n. 过剩，盈余
    - mari	海	maritime	a. 海的，航海的
    - pre	前	predominant	a. 支配的，主要的
    - radi	光线	radiation	n. 辐射
    - sol	独自	solo	a. 单独的 n. 独奏曲
    - tend	伸展	tendency	n. 倾向，趋向
  words:
    accomplishment:
      ST: 2
      P: /əˈkɑːmplɪʃmənt/ 
      S: n. 
      C: 成就;完成
      E:  
        - Let me tell you, I'm really happy I got that scholarship, but I wish my parents would stop bragging to everybody.
        - What, that's quite an accomplishment. If you ask me, I think you deserve a little bit recognition.
      T:
        - 让我来告诉你吧，得到奖学金真让我开心，但是我希望父母别再向每个人炫耀这件事了。
        - 是吗，这的确了不起。如果你问我的话，我觉得你应该得到一些赞誉。
    acronym:
      ST: 1 
      P: /ˈækrənɪm/ 
